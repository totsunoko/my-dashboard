<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablet Dashboard - Redesign</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="dashboard">
        <!-- COLUMN 1 -->
        <div class="card clock-card">
            <div class="clock-content">
                <h1 id="clock-time">18:12</h1>
                <p id="clock-date">3月5日 (木)</p>
            </div>
        </div>

        <div class="card">
            <div class="calendar-grid" id="cal-grid">
                <div class="cal-head">S</div>
                <div class="cal-head">M</div>
                <div class="cal-head">T</div>
                <div class="cal-head">W</div>
                <div class="cal-head">T</div>
                <div class="cal-head">F</div>
                <div class="cal-head">S</div>
                <!-- Body generated by JS -->
            </div>
        </div>

        <!-- COLUMN 2 -->
        <div class="card">
            <div class="weather-loc-tag" id="weather-loc">新宿</div>
            <div class="weather-main">
                <div class="weather-main-icon" id="weather-main-icon">--</div>
                <div style="text-align: center;">
                    <div class="weather-main-temp" id="weather-main-temp">--°</div>
                    <div id="weather-rain" style="font-size: 0.9rem; color: var(--accent); margin-top: -5px;">降水確率 --%
                    </div>
                </div>
            </div>
            <div class="weather-forecast" id="weather-forecast-list" style="margin-bottom: 20px;">
                <!-- Body generated by JS -->
            </div>
            <div id="weather-daily-list" style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px;">
                <!-- Body generated by JS -->
            </div>
        </div>

        <div class="card">
            <div class="sched-title">今日 - 3/5 (木) の予定</div>
            <div class="sched-row">
                <div class="sched-tag-full">終日</div>
                <div class="sched-text">ゴミ出し（可燃物）</div>
            </div>
            <div class="sched-row">
                <div class="sched-time">19:00</div>
                <div class="sched-divider"></div>
                <div class="sched-text">歯医者</div>
            </div>
            <div class="sched-row">
                <div class="sched-time">21:00</div>
                <div class="sched-divider"></div>
                <div class="sched-text">英会話</div>
            </div>
        </div>

        <!-- COLUMN 3 -->
        <div class="card list-card">
            <div class="list-section-title">📍 大阪駅 / 新大阪・高槻・京都方面</div>
            <div class="train-container">
                <div class="train-row">
                    <div class="train-time">18:15</div>
                    <div class="train-label">新快速</div>
                    <div class="train-dest">野洲 <span>行</span></div>
                    <div class="train-countdown">
                        <div class="train-minutes">3</div>
                        <div class="train-sub">分 発車まで</div>
                    </div>
                </div>
                <div class="train-row" style="opacity: 0.4;">
                    <div class="train-time">18:17</div>
                    <div class="train-label" style="background:#555">普通</div>
                    <div class="train-dest">高槻</div>
                    <div class="train-countdown"></div>
                </div>
            </div>

            <div class="news-container">
                <div class="news-row">異例の「土曜日審議」 野党側反対</div>
                <div class="news-row">「教員不足」4年前より深刻 調査</div>
                <div class="news-row">カイロス巡り会見 失敗とは考えず</div>
            </div>
        </div>

        <div class="card music-card">
            <div class="music-top">
                <div class="music-art">
                    <img src="https://i.scdn.co/image/ab67616d0000b27376c986eb4987ba453982894d" alt="art">
                </div>
                <div class="music-meta">
                    <h4>lulu.</h4>
                    <p>Mrs. GREEN APPLE</p>
                </div>
            </div>
            <div class="music-lyrics">
                世界に優しい風が吹いたら
            </div>
            <div class="music-controls">
                <div class="music-progress-bg">
                    <div class="music-progress-fill"></div>
                </div>
                <div class="music-btns">
                    <span>⏮</span>
                    <span class="btn-pause">⏸</span>
                    <span>⏭</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
