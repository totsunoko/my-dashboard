<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablet Dashboard - Redesign</title>
    <style>
        :root {
            --bg-color: #1a1614;
            --card-bg: #231f1d;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --success: #4ade80;
            --card-radius: 28px;
        }

        body {
            margin: 0;
            padding: 30px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1.1fr;
            gap: 25px;
            width: 100%;
            height: 100%;
            max-width: 1600px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--card-radius);
            padding: 35px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* --- Clock Card with Border Animation --- */
        .clock-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* The glow line effect */
        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: var(--card-radius);
            padding: 2px;
            /* thickness */
            background: conic-gradient(from var(--angle), transparent 70%, #fff 100%);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: rotate-angle 4s linear infinite;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotate-angle {
            to {
                --angle: 360deg;
            }
        }

        /* Fallback for browsers not supporting @property */
        @keyframes rotate-fallback {
            100% {
                transform: rotate(360deg);
            }
        }

        .clock-content {
            text-align: center;
        }

        #clock-time {
            font-size: 9rem;
            font-weight: 200;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        #clock-date {
            font-size: 1.6rem;
            color: var(--text-sub);
            margin-top: 20px;
            font-weight: 300;
        }

        /* --- Weather Card --- */
        .weather-loc-tag {
            background: rgba(255, 255, 255, 0.06);
            width: fit-content;
            margin: 0 auto 20px;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .weather-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .weather-icon-large {
            font-size: 5.5rem;
            margin-bottom: 10px;
        }

        .weather-temp-large {
            font-size: 4.5rem;
            font-weight: 200;
        }

        .weather-forecast {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 25px;
        }

        .forecast-hour {
            text-align: center;
        }

        .forecast-time {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .forecast-temp {
            font-size: 1rem;
            font-weight: 500;
        }

        /* --- Train & News List Card --- */
        .list-section-title {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 15px;
            opacity: 0.7;
        }

        .train-container {
            margin-bottom: 20px;
        }

        .train-row {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .train-time {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .train-label {
            background: #0055aa;
            color: white;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .train-dest {
            flex: 1;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .train-dest span {
            font-size: 0.8rem;
            font-weight: normal;
            margin-left: 4px;
        }

        .train-countdown {
            text-align: right;
        }

        .train-minutes {
            font-size: 1.6rem;
            color: var(--success);
            font-weight: bold;
            line-height: 1;
        }

        .train-sub {
            font-size: 0.6rem;
            color: var(--text-sub);
        }

        .news-container {
            margin-top: auto;
        }

        .news-row {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 10px;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Calendar Card --- */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            height: 100%;
        }

        .cal-head {
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cal-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border-radius: 14px;
            aspect-ratio: 1;
            transition: 0.2s;
        }

        .cal-today {
            background: #fff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .cal-other {
            opacity: 0.15;
        }

        /* --- Schedule Card --- */
        .sched-title {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 30px;
        }

        .sched-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            padding: 18px 24px;
            border-radius: 18px;
        }

        .sched-tag-full {
            background: #2b4480;
            color: #fff;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 8px;
        }

        .sched-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: var(--text-sub);
        }

        .sched-divider {
            width: 3px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }

        .sched-text {
            font-size: 1.2rem;
            font-weight: 400;
        }

        /* --- Music Card --- */
        .music-card {
            background: linear-gradient(135deg, #231f1d 0%, #1a1614 100%);
            justify-content: space-between;
        }

        .music-top {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .music-art {
            width: 90px;
            height: 90px;
            border-radius: 18px;
            overflow: hidden;
            background: #333;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .music-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .music-meta h4 {
            font-size: 1.7rem;
            margin: 0;
            font-weight: 600;
        }

        .music-meta p {
            font-size: 1.1rem;
            color: var(--text-sub);
            margin: 6px 0 0;
        }

        .music-lyrics {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 300;
            line-height: 1.3;
            margin: 40px 0;
            color: rgba(255, 255, 255, 0.95);
        }

        .music-controls {
            width: 100%;
        }

        .music-progress-bg {
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .music-progress-fill {
            width: 40%;
            height: 100%;
            background: #fff;
            border-radius: 3px;
        }

        .music-btns {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            font-size: 2.4rem;
            padding-bottom: 10px;
            cursor: pointer;
        }

        .btn-pause {
            font-size: 3rem;
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <!-- COLUMN 1 -->
        <div class="card clock-card">
            <div class="clock-content">

    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];

            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const day = days[now.getDay()];

            document.getElementById('clock-time').textContent = `${h}:${m}`;
            document.getElementById('clock-date').textContent = `${month}月${date}日 (${day})`;

            // Update calendar and weather on a regular basis (e.g., every midnight or hour)
            if (h === '00' && m === '00' && now.getSeconds() === 0) {
                updateCalendar();
                // updateWeatherReal(); // Real API if needed
            }
        }

        function updateCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevDaysInMonth = new Date(year, month, 0).getDate();

            const calGrid = document.getElementById('cal-grid');
            // Keep the headers
            const headers = calGrid.querySelectorAll('.cal-head');
            calGrid.innerHTML = '';
            headers.forEach(h => calGrid.appendChild(h));

            // Previous month cells
            for (let i = firstDay - 1; i >= 0; i--) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell cal-other';
                cell.textContent = prevDaysInMonth - i;
                calGrid.appendChild(cell);
            }

            // Current month cells
            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell';
                if (i === now.getDate()) cell.classList.add('cal-today');
                cell.textContent = i;
                calGrid.appendChild(cell);
            }

            // Next month cells to fill 6 rows (42 cells)
            const filled = calGrid.children.length - 7; // excluding headers
            const needed = 42 - filled;
            for (let i = 1; i <= needed; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell cal-other';
                cell.textContent = i;
                calGrid.appendChild(cell);
            }
        }

        // Initialize
        setInterval(updateTime, 1000);
        updateTime();
        updateCalendar();

        // --- Screen Wake Lock implementation ---
        let wakeLock = null;

        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock is active');

                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock was released');
                    });
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        };

        // Re-request wake lock when page becomes visible again
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // Initial request
        requestWakeLock();

        // Browser support for Border Animation (Chrome/Edge)
        if (!CSS.registerProperty) {
            // Fallback for Firefox/Safari
            document.querySelector('.clock-card').style.animation = 'rotate-fallback 4s linear infinite';
        } else {
            CSS.registerProperty({
                name: '--angle',
                syntax: '<angle>',
                initialValue: '0deg',
                inherits: false
            });
        }
    </script>
</body>

</html>
