<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablet Dashboard - Redesign</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="dashboard">
        <!-- CARD 1: FUSED CLOCK & WEATHER -->
        <div class="card fused-card">
            <div class="fused-main-info">
                <div class="fused-clock-section">
                    <h1 id="clock-time">--:--</h1>
                    <p id="clock-date">--月--日 (-)</p>
                </div>
                <div class="fused-weather-now">
                    <div id="weather-main-icon" class="weather-main-icon">--</div>
                    <div class="weather-now-stats">
                        <div id="weather-main-temp" class="weather-main-temp">--°</div>
                        <div id="weather-rain" class="weather-rain-text">降水確率 --%</div>
                        <div class="weather-loc-tag" id="weather-loc">新宿</div>
                    </div>
                </div>
            </div>
            <div class="fused-forecast-section">
                <div class="weather-forecast" id="weather-forecast-list"></div>
                <div id="weather-daily-list" class="weather-daily-list"></div>
            </div>
        </div>

        <!-- CARD 2: FUSED CALENDAR & SCHEDULE -->
        <div class="card fused-event-card">
            <div class="fused-event-header">
                <h2 class="fused-section-title">カレンダー & 予定</h2>
            </div>
            <div class="fused-event-content">
                <div class="calendar-section">
                    <div class="calendar-grid" id="cal-grid">
                        <div class="cal-head">S</div>
                        <div class="cal-head">M</div>
                        <div class="cal-head">T</div>
                        <div class="cal-head">W</div>
                        <div class="cal-head">T</div>
                        <div class="cal-head">F</div>
                        <div class="cal-head">S</div>
                    </div>
                </div>
                <div class="schedule-section">
                    <div class="sched-title-fused">今日の予定</div>
                    <div class="sched-list" id="schedule-list">
                        <!-- Content generated by JS or static -->
                        <div class="sched-row">
                            <div class="sched-tag-full">終日</div>
                            <div class="sched-text">ゴミ出し（可燃物）</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CARD 3: INTELLIGENT AGENT -->
        <div class="card agent-card">
            <div class="list-section-title">エージェント</div>
            <div class="agent-content">
                <div class="agent-avatar">
                    <div class="agent-sphere"></div>
                </div>
                <div class="agent-message" id="agent-msg">
                    こんにちは。今日の予定を確認しましょう。
                </div>
            </div>
        </div>

        <!-- CARD 4: PUBLIC TRANSPORT -->
        <div class="card transport-card">
            <div class="list-section-title">運行情報 (都内)</div>
            <div class="transport-list" id="transport-delays">
                <div class="transport-row status-ok">
                    <span class="line-tag" style="background: #f34739;">JS</span>
                    <span class="line-name">湘南新宿ライン</span>
                    <span class="line-status">平常運転</span>
                </div>
                <div class="transport-row status-ok">
                    <span class="line-tag" style="background: #00b261;">JY</span>
                    <span class="line-name">山手線</span>
                    <span class="line-status">平常運転</span>
                </div>
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- CARD 5: SMART HOME -->
        <div class="card smarthome-card">
            <div class="list-section-title">スマートホーム</div>
            <div class="smarthome-grid">
                <div class="sm-item">
                    <i data-lucide="lightbulb"></i>
                    <span>リビング照明</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="sm-item">
                    <i data-lucide="thermometer"></i>
                    <span>エアコン (24°C)</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- CARD 6: MUSIC -->
        <div class="card music-card">
            <div class="music-top">
                <div class="music-art">
                    <img src="https://i.scdn.co/image/ab67616d0000b27376c986eb4987ba453982894d" alt="art">
                </div>
                <div class="music-meta">
                    <h4>lulu.</h4>
                    <p>Mrs. GREEN APPLE</p>
                </div>
            </div>
            <div class="music-lyrics">世界に優しい風が吹いたら</div>
            <div class="music-controls">
                <div class="music-progress-bg"><div class="music-progress-fill"></div></div>
                <div class="music-btns">
                    <span>⏮</span>
                    <span class="btn-pause">⏸</span>
                    <span>⏭</span>
                </div>
            </div>
        </div>
    </div>

    <!-- GLOBAL TICKER: NEWS & MARKET -->
    <div class="ticker-wrap">
        <div class="ticker-title">NEWS & MARKET</div>
        <div class="ticker" id="global-ticker">
            <div class="ticker__item">データを読み込み中...</div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
